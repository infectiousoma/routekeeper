# Dante SOCKS5 server config — runs on your US home server.
# Replace the placeholders below with your actual values:
#   YOUR_DANTE_IP       — the WireGuard tunnel IP this server listens on
#                         (must match DANTE_IP in config.env)
#   YOUR_WAN_INTERFACE  — the network interface traffic exits on (e.g. eth0, br0)
#   YOUR_WIREGUARD_SUBNET — the WireGuard subnet to accept connections from
#                           (e.g. 10.8.0.0/24)

internal: YOUR_DANTE_IP port = 1080
external: YOUR_WAN_INTERFACE

logoutput: stderr
clientmethod: none
socksmethod: none
user.privileged: root
user.notprivileged: nobody

client pass { from: YOUR_WIREGUARD_SUBNET to: 0.0.0.0/0 }
socks pass { from: YOUR_WIREGUARD_SUBNET to: 0.0.0.0/0 }
socks pass { from: YOUR_WIREGUARD_SUBNET to: 0.0.0.0/0 protocol: tcp udp }
