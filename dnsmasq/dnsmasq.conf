# Upstream resolvers
no-resolv
server=9.9.9.9
server=8.8.8.8

# Optional: route a local domain to your LAN DNS server
# server=/home.arpa/192.168.X.X

# Bind to loopback alias (works on any LAN — no interface alias needed)
bind-interfaces
listen-address=127.100.53.53,172.17.0.1

# Cache and logging
cache-size=1000
log-queries
log-facility=-

# ipset tagging rules are generated dynamically at startup by proxy-on.sh
# from the DOMAINS_* and IPSET_* variables in config.env.
# The generated file is written to dnsmasq.d/ipsets.conf before the container starts.
# Do not add ipset= lines here — edit config.env instead.
conf-dir=/etc/dnsmasq.d/,*.conf
